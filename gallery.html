<!DOCTYPE html>
<html lang="id">
<head>

<body>
    <header>
        <nav class="navbar-container">
            <a href="index.html" class="logo">Kezia's Portfolio</a>
            <ul class="nav-links">
                <li><a href="index.html">Beranda</a></li>
                <li><a href="gallery.html" class="active">Galeri</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="contact.html">Kontak</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>

    <main>
        <section class="container fade-in">
            <h1 class="section-title" style="text-align: center; margin-bottom: 3rem;">My Visual Gallery</h1>
            
            <div class="gallery-grid">
                <div class="gallery-item fade-in">
                    <img src="Image&vid/WhatsApp Image 2026-03-18 at 9.25.40 PM.jpeg" alt="Foto Gallery 1" loading="lazy">
                </div>
                <div class="gallery-item fade-in">
                    <img src="Image&vid/WhatsApp Image 2026-03-18 at 9.25.36 PM.jpeg" alt="Foto Gallery 2" loading="lazy">
                </div>
                <div class="gallery-item fade-in">
                    <video controls muted loop playsinline style="width:100%; height:auto; max-height:250px; object-fit:contain; border-radius: var(--border-radius); display:block; margin:0 auto;">
                        <source src="Image&vid/ViDVil.mp4" type="video/mp4">
                        Browser tidak mendukung video.
                    </video>
                </div>
                <div class="gallery-item fade-in">
                    <img src="Image&vid/Kezxia.jpeg" alt="Foto Kezxia" loading="lazy">
                </div>
                <div class="gallery-item fade-in">
                    <img src="Image&vid/KEziaBernyanyi.jpg" alt="Kezia Bernyanyi" loading="lazy">
                </div>
                <div class="gallery-item fade-in">
                    <img src="Image&vid/Foto.jpeg" alt="Kezia Bernyanyi" loading="lazy">
                </div>
                 <div class="gallery-item fade-in">
                    <img src="Image&vid/Pemandangan2.jpeg" alt="Kezia Bernyanyi" loading="lazy">
                </div>
            </div>  
        </section>

    <script src="script.js" defer></script>
